name: Deploy Lovable App to GitHub Pages

on:
  push:
    branches:
      - main # Or master, depending on your default branch name

permissions:
  contents: write
  pages: write     
  id-token: write   


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Production Static Files
        run: npm run build

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The output folder generated by your Vite build step
          branch: gh-pages # The target branch where the final built files reside
