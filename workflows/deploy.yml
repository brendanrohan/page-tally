name: Deploy Lovable App to GitHub Pages

on:
  push:
    branches:
      - main # Change to master if your default branch is named master

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Production Static Files
        run: npm run build

      - name: Setup GitHub Pages Configuration
        uses: actions/configure-pages@v5

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # The folder generated by Vite

      - name: Deploy Directly to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
