name: Deploy Lovable App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install --frozen-lockfile

      - name: Build Production Static Files
        run: bun run build

      - name: Inspect Build Directories (Debug) # <-- Added to find your hidden folder!
        run: |
          echo "=== Root Directory Check ==="
          ls -la
          echo "============================"

      - name: Setup GitHub Pages Configuration
        uses: actions/configure-pages@v5

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # We will adjust this once we see the log names
